<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPTEL Computer Networking — Exam Master Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #030712;
            --bg-card: rgba(17, 24, 39, 0.7);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --green: #10b981;
            --red: #ef4444;
            --gold: #f59e0b;
            --glass: blur(20px);
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; line-height: 1.6; }

        /* BACKGROUND ORBS */
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.2; pointer-events: none; }
        .orb-1 { width: 500px; height: 500px; background: var(--accent); top:-100px; left:-100px; }
        .orb-2 { width: 400px; height: 400px; background: #7c3aed; bottom:-100px; right:-100px; }

        /* NAVIGATION */
        .nav { position: fixed; top:0; left:0; width:100%; height:72px; background: rgba(3, 7, 18, 0.8); backdrop-filter: var(--glass); border-bottom: 1px solid var(--border); z-index: 1000; display:flex; align-items:center; justify-content:space-between; padding:0 32px; }
        .logo { display:flex; align-items:center; gap:12px; font-weight:800; font-size:1.25rem; letter-spacing:-0.5px; cursor:pointer; }
        .logo-box { width:40px; height:40px; background: linear-gradient(135deg, var(--accent), #7c3aed); border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 16px var(--accent-glow); }
        .logo-text span { color: var(--accent-light); }

        .nav-stats { display:flex; gap:24px; }
        .stat { text-align:right; }
        .stat-val { font-size:0.9rem; font-weight:700; color:var(--accent); display:block; }
        .stat-label { font-size:0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing:1px; }

        /* LAYOUT */
        .layout { display:flex; margin-top:72px; min-height:calc(100vh - 72px); }
        
        /* SIDEBAR */
        .sidebar { width:300px; position:fixed; top:72px; bottom:0; left:0; border-right: 1px solid var(--border); padding:24px 16px; overflow-y:auto; background: rgba(17,24,39,0.4); backdrop-filter: var(--glass); z-index: 100; transition: transform 0.3s; }
        .sidebar-label { font-size:0.7rem; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin:24px 0 12px 12px; }
        .side-item { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-radius:14px; color:var(--text-dim); cursor:pointer; transition: 0.3s; margin-bottom:4px; border: 1px solid transparent; }
        .side-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .side-item.active { background: var(--accent-glow); color: #fff; border-color: rgba(99,102,241,0.2); font-weight:600; }
        .side-item.active .dot { background: var(--accent); }
        .dot { width:8px; height:8px; border-radius:50%; background: var(--border); transition: 0.3s; }
        .side-item.done .dot { background: var(--green); box-shadow: 0 0 10px var(--green); }

        /* CONTENT */
        .content { flex:1; margin-left:300px; padding:48px 64px 80px; max-width:1100px; }

        /* COMMON COMPONENTS */
        .card { background: var(--bg-card); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius:24px; padding:40px; margin-bottom:40px; transition: 0.3s; }
        .card:hover { border-color: rgba(255,255,255,0.15); }
        .badge { display:inline-block; padding:6px 14px; background: var(--accent-glow); color:var(--accent); border-radius:99px; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
        .title { font-size:2.75rem; font-weight:800; margin-bottom:12px; letter-spacing:-1.5px; line-height:1.1; }
        .subtitle { font-size:1.15rem; color:var(--text-dim); margin-bottom:40px; font-weight:300; }

        .btn { display:inline-flex; align-items:center; gap:12px; padding:16px 32px; border-radius:16px; font-weight:700; cursor:pointer; transition: 0.3s; border:none; font-family:inherit; font-size:0.95rem; text-decoration:none; }
        .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 8px 24px var(--accent-glow); }
        .btn-primary:hover { background: #818cf8; transform: translateY(-2px); box-shadow: 0 12px 32px var(--accent-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--border); }

        /* RESOURCES */
        .res-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:48px; }
        .res-item { background: rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:20px; padding:28px; display:flex; align-items:center; gap:20px; cursor:pointer; transition:0.3s; text-decoration:none; color:inherit; }
        .res-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); transform:translateY(-3px); }
        .res-icon { width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
        .res-icon.notes { background: rgba(99, 102, 241, 0.1); color: var(--accent); }
        .res-icon.slides { background: rgba(245, 158, 11, 0.1); color: var(--gold); }
        .res-info h4 { margin-bottom:4px; font-weight:700; }
        .res-info p { font-size:0.85rem; color: var(--text-dim); }

        /* TOPICS */
        .topics-list { display:grid; grid-template-columns:1fr 1fr; gap:14px 40px; list-style:none; }
        .topic-item { display:flex; align-items:center; gap:12px; font-size:0.95rem; color: var(--text-dim); }
        .topic-item::before { content:''; width:6px; height:6px; background:var(--accent); border-radius:50%; opacity:0.6; }

        /* QUIZ MODE */
        .view-syllabus .quiz-view { display:none; }
        .view-quiz .syllabus-view { display:none; }

        .quiz-card { background: var(--bg-card); border-radius:32px; padding:60px 40px; border:1px solid var(--border); position: relative; overflow:hidden; }
        .quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
        .quiz-count { font-size:0.8rem; font-weight:800; color: var(--accent); text-transform:uppercase; letter-spacing:2px; }
        .quiz-close { font-size:1.5rem; cursor:pointer; opacity:0.5; transition:0.3s; }
        .quiz-close:hover { opacity:1; }
        
        .q-text { font-size:1.6rem; font-weight:700; line-height:1.4; margin-bottom:48px; }
        .q-text code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
        
        .options-list { display:grid; gap:14px; }
        .option-btn { width:100%; text-align:left; padding:20px 28px; background: rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:18px; color:inherit; font-size:1.05rem; cursor:pointer; transition:0.3s; font-family:inherit; }
        .option-btn:hover:not(.disabled) { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .option-btn.correct { background: rgba(16,185,129,0.15); border-color: var(--green); color: var(--green); font-weight:600; }
        .option-btn.wrong { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); font-weight:600; }
        .option-btn.disabled { pointer-events: none; opacity:0.9; }

        /* INPUT STYLES */
        .quiz-input { width: 100%; padding: 18px 24px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 18px; color: #fff; font-family: inherit; font-size: 1.1rem; margin-bottom: 24px; outline: none; transition: 0.3s; }
        .quiz-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }
        .quiz-textarea { min-height: 140px; resize: vertical; }

        .feedback-box { margin-top:40px; padding:32px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius:24px; display:none; animation: slideUp 0.5s ease; }
        .feedback-box.visible { display:block; }
        .fb-status { font-weight:800; margin-bottom:10px; font-size:1.1rem; text-transform:uppercase; letter-spacing:1px; }
        .fb-explanation { font-size:1rem; color: var(--text-dim); }
        .fb-explanation code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
        
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* SCORE VIEW */
        .score-view { text-align:center; padding:40px; }
        .score-circle { width:150px; height:150px; border-radius:50%; border:8px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:3rem; font-weight:800; margin:0 auto 32px; color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }
        
        /* RESPONSIVE */
        @media (max-width: 1024px) { .sidebar { transform: translateX(-100%); } .content { margin-left:0; padding:32px 20px; } .res-grid, .topics-list { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="view-syllabus">

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <nav class="nav">
        <div class="logo" onclick="goHome()">
            <div class="logo-box">CN</div>
            <div class="logo-text">IIT-K Master <span>Hub</span></div>
        </div>
        <div class="nav-stats">
            <div class="stat">
                <span class="stat-val" id="globalProgress">0%</span>
                <span class="stat-label">HUB Mastery</span>
            </div>
            <div class="stat">
                <span class="stat-val" id="completedCount">0/12</span>
                <span class="stat-label">Weeks Done</span>
            </div>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-label">Course Timeline</div>
            <div id="sidebarMenu"></div>
        </aside>

        <main class="content">
            <div class="syllabus-view" id="syllabusView">
                <div id="weekContent"></div>
            </div>
            <div class="quiz-view" id="quizView">
                <div class="quiz-card" id="quizCard"></div>
            </div>
        </main>
    </div>

    <script>
        const WEEKS_DATA = [
            {
                id: 1, title: "Introduction to Computer Networks",
                desc: "History, architecture, classifications, and the OSI/TCP-IP models.",
                notes: "cn_week1_notes.html", slides: "Week-01.pdf",
                topics: ["Layering Protocols", "Circuit vs Packet Switching", "OSI 7-Layer Model", "Internet History"],
                questions: [
                    {t:'mcq', diff:'easy', q:"Which layer of the OSI model is responsible for routing packets across multiple networks?", options:["Data Link Layer","Network Layer","Transport Layer","Session Layer"], ans:1, exp:"The Network Layer (Layer 3) handles logical addressing and routing — deciding the path a packet takes."},
                    {t:'mcq', diff:'easy', q:"What does 'protocol' consist of? Choose the three key elements.", options:["Syntax, Semantics, Timing","Speed, Size, Security","Hardware, Software, Firmware","Encoding, Decoding, Routing"], ans:0, exp:"A protocol has three elements — Syntax (format), Semantics (meaning), and Timing (speed matching)."},
                    {t:'mcq', diff:'easy', q:"Which device operates at Layer 1 (Physical Layer) and simply regenerates signals?", options:["Switch","Bridge","Hub","Router"], ans:2, exp:"A Hub operates at Layer 1. It just regenerates and broadcasts bits on all ports."},
                    {t:'tf', diff:'easy', q:"A router operates at the Network Layer (Layer 3) of the OSI model.", ans:true, exp:"TRUE. A router inspects the IP header (Layer 3) to make forwarding decisions."},
                    {t:'fib', diff:'easy', q:"The three elements of a protocol are: Syntax, ________, and Timing.", ans:"Semantics", exp:"Protocol = Syntax + Semantics + Timing. Remember SST."},
                    {t:'mcq', diff:'med', q:"In circuit switching, before data transfer begins:", options:["Packets are independently routed","A dedicated path is established end-to-end","Store-and-forward is used","Virtual IDs used"], ans:1, exp:"Circuit switching requires a dedicated path established in the setup phase."},
                    {t:'sa', diff:'hard', q:"What was the primary contribution of ARPANET to modern networking?", ans:"Packet Switching", exp:"ARPANET (1969) pioneered store-and-forward packet switching, the foundation of the internet."}
                ]
            },
            {
                id: 2, title: "Application Layer Protocols",
                desc: "DNS, FTP/TFTP, HTTP, Telnet, SMTP, SNMP.",
                notes: "cn_week2_notes.html", slides: "Week-02.pdf",
                topics: ["DNS Hierarchy", "FTP Active/Passive", "HTTP Status Codes", "MIME"],
                questions: [
                    {t:'mcq',q:"DNS record type that maps hostname to IPv4 address?", options:["AAAA","NS","MX","A"], ans:3, exp:"A record = hostname → IPv4. AAAA = hostname → IPv6."},
                    {t:'tf',q:"HTTP is a stateless protocol.", ans:true, exp:"TRUE. Each request is independent. Cookies manage state."},
                    {t:'fib',q:"HTTP status code for 'Not Found' is ________.", ans:"404", exp:"404 means the resource does not exist."}
                ]
            },
            {
                id: 3, title: "Transport Layer: Reliability",
                desc: "ARQ mechanisms, 3-way handshake, and connection management.",
                notes: "cn_week3_notes.html", slides: "Week-03.pdf",
                topics: ["Stop-and-Wait", "Go-Back-N", "Selective Repeat", "Piggybacking"],
                questions: [
                    {t:'mcq',q:"In GBN with 3-bit seq numbers, max window size is:", options:["8","7","4","6"], ans:1, exp:"GBN: W <= 2^n - 1. So 8-1=7."},
                    {t:'tf',q:"TCP 3WHS exchange SYN bits in the first 2 messages.", ans:true, exp:"TRUE. SYN, then SYN+ACK."}
                ]
            },
            {
                id: 4, title: "TCP Deep Dive",
                desc: "BDP, Window Sizing, AIMD, and Buffer management.",
                notes: "cn_week4_notes.html", slides: "Week-04.pdf",
                topics: ["BDP formula", "AIMD Fairness", "Congestion Collapse", "TCP Flags"],
                questions: [
                    {t:'mcq',q:"AIMD stands for:", options:["Additive Increase Multiplicative Decrease","Auto Increase Max Decrease","Adaptive Internet Mgmt","Additive Increase Max Drop"], ans:0, exp:"AIMD is the core congestion control mechanism."},
                    {t:'num',q:"If TCP HLEN is 6, what is the header size in bytes?", ans:"24", exp:"6 * 4 = 24 bytes."}
                ]
            },
            {
                id: 5, title: "TCP Timers & Congestion",
                desc: "Tahoe/Reno, SACK, Delayed ACKs, and SWS.",
                notes: "cn_week5_notes.html", slides: "Week-05.pdf",
                topics: ["Fast Retransmit", "Karn's Algorithm", "Jacobson's RTO", "Nagle Algorithm"],
                questions: [
                    {t:'mcq',q:"TCP Reno's response to 3 DupACKs?", options:["Drop to 1 MSS","Fast Recovery to ssthresh","Half ssthresh, stay at cwnd","Timeout"], ans:1, exp:"Reno enters Fast Recovery, skipping the slow start restart if possible."},
                    {t:'tf',q:"Nagle's algorithm buffers small segments until an ACK arrives.", ans:true, exp:"TRUE. This reduces the number of tiny segments."}
                ]
            },
            {
                id: 6, title: "Network Layer: IP & Addressing",
                desc: "IP Header, CIDR, Subnetting, NAT, and ICMP.",
                notes: "cn_week6_notes.html", slides: "Week-06.pdf",
                topics: ["IP Header IHL", "TTL Logic", "LPM", "PAT"],
                questions: [
                    {t:'num',q:"Usable hosts in /26 subnet?", ans:"62", exp:"2^6 - 2 = 62."},
                    {t:'fib',q:"Field in IP header that prevents infinite loops is ________.", ans:"TTL", exp:"Time To Live is decremented at each hop."}
                ]
            },
            {
                id: 7, title: "Routing Algorithms",
                desc: "Distance Vector, Link State, and BGP overview.",
                notes: "cn_week7_notes.html", slides: "Week-07.pdf",
                topics: ["Bellman-Ford", "Dijkstra", "RIP", "OSPF"],
                questions: [
                    {t:'mcq',q:"Which routing algorithm suffers from 'Count to Infinity'?",options:["Dijkstra","Bellman-Ford","BGP","Static"],ans:1,exp:"Distance Vector algorithms like Bellman-Ford have slow convergence for 'bad news'."}
                ]
            },
            {
                id: 8, title: "TCP/UDP Operations",
                desc: "Flow control and connection management details.",
                notes: "cn_week8_notes.html", slides: "Week-08.pdf",
                topics: ["Socket Pairs", "UDP Header", "TCP Checksum", "State Diagram"],
                questions: [
                    {t:'fib',q:"Size of UDP header in bytes is ________.",ans:"8",exp:"Source, Dest, Length, Checksum (2 bytes each)."}
                ]
            },
            {
                id: 9, title: "Router Design & SDN",
                desc: "IP Router architecture, Switching Fabrics, and SDN.",
                notes: "cn_week9_notes.html", slides: "Week-09.pdf",
                topics: ["Lookup Engine", "Shared Memory Fabric", "Crossbar Fabric", "OpenFlow"],
                questions: [
                    {t:'mcq',q:"Which switching fabric has NO contention for different outputs?",options:["Bus","Shared Memory","Crossbar","Multistage"],ans:2,exp:"Crossbar fabrics allow multiple paths as long as outputs differ."}
                ]
            },
            {
                id: 10, title: "MAC & Data Link Control",
                desc: "Framing methods, MAC protocols, and Error Control.",
                notes: "cn_week10_notes.html", slides: "Week-10.pdf",
                topics: ["Bit/Byte Stuffing", "ALOHA Efficiency", "CSMA/CD", "Parity/CRC"],
                questions: [
                    {t:'tf',q:"Pure ALOHA efficiency is exactly 18.4%.",ans:true,exp:"TRUE. Peak efficiency is 1/(2e)."}
                ]
            },
            {
                id: 11, title: "ARP, DHCP & VLANs",
                desc: "L2 support protocols and network segmenting.",
                notes: "cn_week11_notes.html", slides: "Week-11.pdf",
                topics: ["ARP Mapping", "DHCP DORA", "STP loop prevention", "Tagged VLANs"],
                questions: [
                    {t:'mcq',q:"DHCP message for server to offer IP?",options:["Discover","Offer","Request","ACK"],ans:1,exp:"Offer is the 2nd step in DORA."}
                ]
            },
            {
                id: 12, title: "Physical Layer & Security",
                desc: "Signals, Modulation, and Network Security basics.",
                notes: "cn_week12_notes.html", slides: "Week-12.pdf",
                topics: ["Nyquist/Shannon", "Manchester Encoding", "QAM", "RSA/Firewalls"],
                questions: [
                    {t:'fib',q:"Manchester encoding transition happens at ________ of bit.",ans:"middle",exp:"Mid-bit transition for synchronization."}
                ]
            }
        ];

        let state = {
            currentWeek: 0,
            completedWeeks: JSON.parse(localStorage.getItem('cn_completed')) || [],
            quizActive: false, quizIndex: 0, quizScore: 0, quizFinished: false
        };

        const saveState = () => { localStorage.setItem('cn_completed', JSON.stringify(state.completedWeeks)); updateNavStats(); };
        const updateNavStats = () => { 
            const count = state.completedWeeks.length;
            document.getElementById('completedCount').innerText = `${count}/12`;
            document.getElementById('globalProgress').innerText = `${Math.round((count/12)*100)}%`;
        };

        const renderSidebar = () => {
            document.getElementById('sidebarMenu').innerHTML = WEEKS_DATA.map((w, i) => `
                <div class="side-item ${state.currentWeek === i ? 'active' : ''} ${state.completedWeeks.includes(w.id) ? 'done' : ''}" onclick="switchWeek(${i})">
                    <span>Week ${w.id}</span> <div class="dot"></div>
                </div>`).join('');
        };

        const renderWeek = () => {
            const w = WEEKS_DATA[state.currentWeek];
            document.getElementById('weekContent').innerHTML = `
                <div class="badge">Module ${w.id}</div>
                <h1 class="title">${w.title}</h1>
                <p class="subtitle">${w.desc}</p>
                <div class="res-grid">
                    <a href="${w.notes}" target="_blank" class="res-item"><div class="res-icon notes">📄</div><div class="res-info"><h4>Notes</h4><p>Key Concepts</p></div></a>
                    <a href="${w.slides}" target="_blank" class="res-item"><div class="res-icon slides">📊</div><div class="res-info"><h4>Slides</h4><p>Official PDF</p></div></a>
                </div>
                <div class="card topics-card"><h3 style="margin-bottom:20px;">Syllabus Topics</h3><ul class="topics-list">${w.topics.map(t => `<li class="topic-item">${t}</li>`).join('')}</ul></div>
                <div style="display:flex; gap:16px;">
                    <button class="btn btn-primary" onclick="startQuiz()">🚀 Start Quiz</button>
                    <button class="btn btn-outline" onclick="toggleComplete()">${state.completedWeeks.includes(w.id) ? '✓ Completed' : 'Mark as Done'}</button>
                </div>`;
            renderSidebar();
        };

        const switchWeek = (i) => { state.currentWeek = i; state.quizActive = false; document.body.className = "view-syllabus"; renderWeek(); window.scrollTo(0,0); };
        const goHome = () => switchWeek(0);
        const toggleComplete = () => {
            const id = WEEKS_DATA[state.currentWeek].id;
            state.completedWeeks = state.completedWeeks.includes(id) ? state.completedWeeks.filter(wid => wid !== id) : [...state.completedWeeks, id];
            saveState(); renderWeek();
        };

        const startQuiz = () => { state.quizActive = true; state.quizIndex = 0; state.quizScore = 0; state.quizFinished = false; document.body.className = "view-quiz"; renderQuiz(); };

        const renderQuiz = () => {
            const w = WEEKS_DATA[state.currentWeek], q = w.questions[state.quizIndex], container = document.getElementById('quizCard');
            if(state.quizFinished) {
                const percent = Math.round((state.quizScore / w.questions.length) * 100);
                container.innerHTML = `<div class="score-view"><div class="score-circle">${percent}%</div><h2>Week ${w.id} Done!</h2><p style="color:var(--text-dim);">Score: ${state.quizScore}/${w.questions.length}</p><div style="margin-top:40px; display:flex; gap:16px; justify-content:center;"><button class="btn btn-primary" onclick="switchWeek(${state.currentWeek})">Finish</button><button class="btn btn-outline" onclick="startQuiz()">Retry</button></div></div>`;
                if(percent >= 80 && !state.completedWeeks.includes(w.id)) toggleComplete(); return;
            }
            let optionsHtml = ''; const type = q.t || 'mcq';
            if (type === 'mcq') optionsHtml = `<div class="options-list">${q.options.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>`).join('')}</div>`;
            else if (type === 'tf') optionsHtml = `<div class="options-list" style="grid-template-columns: 1fr 1fr; display: grid;"><button class="option-btn" onclick="checkAnswer(true)">True</button><button class="option-btn" onclick="checkAnswer(false)">False</button></div>`;
            else if (type === 'fib' || type === 'num') optionsHtml = `<input type="text" id="quizInput" class="quiz-input" placeholder="Answer..."><button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="checkWrittenAnswer()">Check</button>`;
            else if (type === 'sa') optionsHtml = `<textarea id="quizInput" class="quiz-input quiz-textarea" placeholder="Recall answer..."></textarea><button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="checkWrittenAnswer(true)">Reveal</button>`;
            container.innerHTML = `<div class="quiz-header"><span class="quiz-count">Q ${state.quizIndex + 1}/${w.questions.length} [${type.toUpperCase()}]</span><span class="quiz-close" onclick="switchWeek(${state.currentWeek})">✕</span></div><div class="q-text">${q.q}</div>${optionsHtml}<div class="feedback-box" id="feedback"><div class="fb-status" id="fbStatus">Correct!</div><div class="fb-explanation" id="fbExp">${q.explanation || q.exp || ''}</div><button class="btn btn-primary" style="margin-top:24px; width:100%; justify-content:center;" onclick="nextQuestion()">Next</button></div>`;
        };

        const checkAnswer = (val) => {
            const q = WEEKS_DATA[state.currentWeek].questions[state.quizIndex], type = q.t || 'mcq', correct = q.ans !== undefined ? q.ans : q.correct;
            const btns = document.querySelectorAll('.option-btn'); let isCorrect = false;
            if (type === 'mcq') { btns.forEach((btn, idx) => { btn.classList.add('disabled'); if(idx === correct) btn.classList.add('correct'); else if(idx === val) btn.classList.add('wrong'); }); isCorrect = (val === correct); }
            else if (type === 'tf') { btns.forEach(btn => { btn.classList.add('disabled'); const btnVal = btn.innerText.toLowerCase() === 'true'; if (btnVal === correct) btn.classList.add('correct'); else if (btnVal === val) btn.classList.add('wrong'); }); isCorrect = (val === correct); }
            if(isCorrect) state.quizScore++; showFeedback(isCorrect);
        };

        const checkWrittenAnswer = (revealOnly = false) => {
            const q = WEEKS_DATA[state.currentWeek].questions[state.quizIndex], input = document.getElementById('quizInput'), userVal = input.value.trim().toLowerCase(), correct = (q.ans !== undefined ? q.ans : q.correct).toString().toLowerCase();
            let isCorrect = false; if (!revealOnly) { isCorrect = (userVal === correct); if (isCorrect) state.quizScore++; input.style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)'; } else isCorrect = true;
            input.disabled = true; showFeedback(isCorrect, revealOnly);
        };

        const showFeedback = (isCorrect, reveal = false) => {
            const fb = document.getElementById('feedback'), st = document.getElementById('fbStatus');
            if (reveal) { st.innerText = "Suggested Answer"; st.style.color = "var(--accent)"; }
            else { st.innerText = isCorrect ? "✓ Correct" : "✕ Incorrect"; st.style.color = isCorrect ? "var(--green)" : "var(--red)"; }
            fb.classList.add('visible');
        };

        const nextQuestion = () => {
            const w = WEEKS_DATA[state.currentWeek]; state.quizIndex++;
            if(state.quizIndex >= w.questions.length) state.quizFinished = true; renderQuiz();
        };

        window.onload = () => { updateNavStats(); renderWeek(); };
    </script>
</body>
</html>
